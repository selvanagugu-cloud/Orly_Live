x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # GCP credentials — mount from local gcloud config
    GOOGLE_APPLICATION_CREDENTIALS: /home/airflow/.config/gcloud/application_default_credentials.json
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      google-cloud-bigquery==3.25.0
      dbt-bigquery==1.8.3
  volumes:
    - ./dags:/opt/airflow/dags
    # Mount local gcloud ADC credentials (read-only)
    # Run first: gcloud auth application-default login
    - ~/.config/gcloud:/home/airflow/.config/gcloud:ro
    # Mount the dbt project so Airflow can run dbt commands
    - ../dbt:/opt/airflow/dbt:ro
    # Mount dbt profiles (contains BigQuery connection)
    - ~/.dbt:/home/airflow/.dbt:ro
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Nagulan
          --lastname S
          --role Admin
          --email admin@orly-live.local
      "
    restart: on-failure

volumes:
  airflow-logs:
